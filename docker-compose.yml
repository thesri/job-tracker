

services:
  web:
    build: .
    command: >
     sh -c "
     python manage.py migrate &&
     python manage.py runserver 0.0.0.0:8000
     "
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db    
    environment:
      - DB_NAME=jobtracker
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: